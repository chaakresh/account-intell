name: Daily Intelligence Report

on:
  schedule:
    - cron: '30 1 * * *'   # 7:00 AM IST (UTC+5:30)
  workflow_dispatch:        # Manual trigger

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @google/generative-ai dotenv

      - name: Generate daily report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate_daily.js

      - name: Commit and push report
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "ITCI Intelligence Bot"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/Chaakresh/account-intell.git
          git add report.json
          git diff --staged --quiet || git commit -m "Daily report: $(TZ='Asia/Kolkata' date +'%Y-%m-%d %H:%M IST')"
          git push
